<!-- MOCKUP FAVICON - Substitua pelo seu SVG definitivo -->
<!-- Arquivos de favicon esperados em /public/:
     - icon.svg         → favicon vetorial (todos os navegadores modernos)
     - icon-light-32x32.png → favicon 32x32 para modo claro
     - icon-dark-32x32.png  → favicon 32x32 para modo escuro
     - apple-icon.png       → ícone Apple (recomendado: 180x180px)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0f172a; }
      .fg { fill: #f8fafc; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #f8fafc; }
      .fg { fill: #0f172a; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37"/>
  <text class="fg" x="90" y="118" font-family="sans-serif" font-size="72"
        font-weight="bold" text-anchor="middle">VM</text>
</svg>
